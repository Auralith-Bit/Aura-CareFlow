<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareFlow - Live Queue Monitor</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ==========================================================================
    Theme Variables (Light Mode Default & Dark Mode Overrides)
   ========================================================================== */
:root[data-theme="light"] {
    --bg-main: #f8fafc;
    --bg-surface: #ffffff;
    --bg-surface-hover: rgba(0, 0, 0, 0.04);
    --border-color: #e2e8f0;
    --border-subtle: #f1f5f9;
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --metric-num: #0f172a;
    
    /* Specific element adjustments */
    --sms-bg: #fdf8f2;
    --sms-border: #f9ebda;
    --sms-title: #7c2d12;
    --sms-text: #9a3412;
    
    --table-th-bg: #f8fafc;
    --track-rail: #f1f5f9;
}

:root[data-theme="dark"] {
    --bg-main: #0f172a;
    --bg-surface: #1e293b;
    --bg-surface-hover: rgba(255, 255, 255, 0.04);
    --border-color: #334155;
    --border-subtle: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: #cbd5e1;
    --text-muted: #94a3b8;
    --metric-num: #ffffff;
    
    /* Specific element adjustments */
    --sms-bg: #2c1a04;
    --sms-border: #432b08;
    --sms-title: #fde8d0;
    --sms-text: #f59e0b;
    
    --table-th-bg: #1e293b;
    --track-rail: #334155;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
    background: var(--bg-main);
    color: var(--text-primary);
    display: flex;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}

/* ==========================================================================
    Sidebar Structure (Remains consistently rich dark green in both modes)
   ========================================================================== */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #045743;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
}

.sidebar a {
    text-decoration: none;
    color: inherit;
    display: block;
}

.logo-section {
    padding: 15px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,.08);
}
* {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

.logo-box {
    background: #ffffff;
    width: 110px;
    height: 42px;
    margin: 0 auto 8px auto;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* Ensures image corners stay rounded inside the container */
}

/* ==========================================================================
    ADDED CSS FOR LOGO IMAGE
   ========================================================================== */
.logo-img {
            width: 175px;
            height: 170px;
            display: block;
            margin: auto;
        }

.tagline {
        margin-top: 8px;
        color: #bfd1cb;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: .5px;
    }

.menu {
    flex: 1;
    padding: 10px 6px;
}

.section-title {
    color: #86a79f;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    margin: 10px;
}

.menu-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    margin: 5px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: .3s;
}

.menu-item:hover {
    background: rgba(255, 255, 255, .08);
}

.menu-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.menu-left i {
    font-size: 18px;
    width: 20px;
    color: #c8d8d2;
    transition: color .3s;
}

.menu-left span {
    font-size: 15px;
    color: #d7e2de;
    transition: color .3s;
}

/* Active State Styles */
.active {
    background: rgba(255, 255, 255, .12);
    position: relative;
}

.active .menu-left i,
.active .menu-left span {
    color: #ffffff;
}

.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 4px;
    background: #18d4a1;
    border-radius: 10px;
}

.badge {
    background: #15b887;
    color: white;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
}

.user-section {
    border-top: 1px solid rgba(255, 255, 255, .08);
    padding: 12px;
}

.user {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.user-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #1fb087;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    border: 2px solid rgba(255, 255, 255, .2);
}

.user-info h3 {
    font-size: 14px;
    margin-bottom: 2px;
}

.user-info p {
    color: #a9c0b8;
    font-size: 11px;
}

.dots {
    color: #78938c;
    font-size: 16px;
    cursor: pointer;
}

/* ==========================================================================
    Main Content Workspace Architecture
   ========================================================================== */
.main-content {
    flex-grow: 1;
    padding: 24px 32px;
    overflow-y: auto;
}

.workspace-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Top Dashboard Header Navigation */
.header-navigation h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
}

.header-navigation {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.top-actions {
    display: flex;
    align-items: center;
    gap: 12px;
}

.search-box {
    width: 320px;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.3s, border-color 0.3s;
}

.search-box i {
    color: var(--text-muted);
    font-size: 16px;
}

.search-box input {
    border: none;
    outline: none;
    font-size: 14px;
    color: var(--text-secondary);
    background: transparent;
    width: 100%;
}

.icon-btn {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--bg-surface);
    cursor: pointer;
    font-size: 16px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
}

.icon-btn:hover {
    background: var(--bg-surface-hover);
}

.notification-dot {
    width: 8px;
    height: 8px;
    background: #ef4444;
    border-radius: 50%;
    position: absolute;
    top: 10px;
    right: 11px;
    border: 1.5px solid var(--bg-surface);
}
</style>
</head>
<body>

<aside class="sidebar">
    <div>
        <div class="logo-section">
                <img src="logo.jpeg" alt="CareFlow Logo" class="logo-img">
                <div class="tagline">Smart OPD Booking System</div>
            </div>
        </div>

        <div class="menu">
            <div class="section-title">MAIN</div>
            <a href="dashboard.html">
                <div class="menu-item">
                    <div class="menu-left">
                        <i class="fa-solid fa-table-cells-large"></i>
                        <span>Dashboard</span>
                    </div>
                </div>
            </a>
            <a href="live-queue.html">
                <div class="menu-item">
                    <div class="menu-left">
                        <i class="fa-solid fa-list-ol"></i>
                        <span>Live Queue</span>
                    </div>
                    <div class="badge">3 Ahead</div>
                </div>
            </a>
            <a href="book-appointment.html">
                <div class="menu-item">
                    <div class="menu-left">
                        <i class="fa-regular fa-calendar-plus"></i>
                        <span>Book Appointment</span>
                    </div>
                </div>
            </a>
            <a href="my-bookings.html">
                <div class="menu-item">
                    <div class="menu-left">
                        <i class="fa-regular fa-calendar-days"></i>
                        <span>My Bookings</span>
                    </div>
                </div>
            </a>
            <div class="section-title">ACCOUNT</div>
            <a href="profile.html">
                <div class="menu-item">
                    <div class="menu-left">
                        <i class="fa-regular fa-user"></i>
                        <span>Profile</span>
                    </div>
                </div>
            </a>
            <a href="notifications.html">
                <div class="menu-item active">
                    <div class="menu-left">
                        <i class="fa-regular fa-bell"></i>
                        <span>Notifications</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="user-section">
        <div class="user">
            <div class="user-left">
                <div class="avatar">ST</div>
                <div class="user-info">
                    <h3>Sushil Thapa</h3>
                    <p>+977-9812345678</p>
                </div>
            </div>
            <div class="dots"><i class="fa-solid fa-ellipsis-vertical"></i></div>
        </div>
    </div>
</aside>

<main class="main-content">
    <div class="workspace-container">
        <header class="header-navigation">
            <h1>NOTIFICATIONS</h1>
            <div class="top-actions">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search appointments, doctors...">
                </div>
                <button class="icon-btn" id="themeToggler" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="icon-btn">
                    <i class="fa-regular fa-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <button class="icon-btn">
                    <i class="fa-regular fa-circle-question"></i>
                </button>
            </div>
        </header>
    </div>
</main>

<script>
    const themeToggler = document.getElementById('themeToggler');
    const rootElement = document.documentElement;

    const currentTheme = localStorage.getItem('theme') || 'light';
    rootElement.setAttribute('data-theme', currentTheme);
    updateToggleIcon(currentTheme);

    themeToggler.addEventListener('click', () => {
        const activeTheme = rootElement.getAttribute('data-theme');
        const targetTheme = activeTheme === 'light' ? 'dark' : 'light';
        
        rootElement.setAttribute('data-theme', targetTheme);
        localStorage.setItem('theme', targetTheme);
        updateToggleIcon(targetTheme);
    });

    function updateToggleIcon(theme) {
        const icon = themeToggler.querySelector('i');
        if (theme === 'dark') {
            icon.className = 'fa-solid fa-sun';
        } else {
            icon.className = 'fa-solid fa-moon';
        }
    }
</script>
</body>
</html>
